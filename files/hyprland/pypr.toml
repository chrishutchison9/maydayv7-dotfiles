[pyprland]
plugins = [
  "scratchpads",
  "toggle_special"
]

[scratchpads.term]
animation = "fromTop"
command = "kitty --class kitty-dropterm"
class = "kitty-dropterm"
lazy = true
size = "75% 60%"
unfocus = "hide"

[scratchpads.clip]
animation = "fromBottom"
command = "kitty --class kitty-clip 'clipse'"
class = "kitty-clip"
lazy = true
size = "75% 65%"
margin = 30
