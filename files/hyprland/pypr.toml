[pyprland]
plugins = [
  "gamemode",
  "magnify",
  "scratchpads",
  "toggle_special"
]

[gamemode]
auto = true
# Refine via: hyprctl clients -j | jq '.[].class'
patterns = ["steam_app_*", "gamescope*", "*.exe"]
border_size = 2
hysteresis = 2.0

[scratchpads.top]
animation = "fromTop"
lazy = true
size = "75% 60%"

[scratchpads.bottom]
animation = "fromBottom"
size = "75% 60%"
margin = 30
lazy = true

[scratchpads.calc]
command = "qalculate-gtk"
class = "qalculate-gtk"
use = "top"
unfocus = "hide"

[scratchpads.term]
command = "kitty --class kitty-dropterm"
class = "kitty-dropterm"
use = "top"
unfocus = "hide"

[scratchpads.emoji]
use = "bottom"
command = "smile"
class = "it.mijorus.smile"
unfocus = "hide"
